services:
  - type: web
    name: pathik
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install --include=dev && npm run build
    startCommand: cd backend && node dist/server.js
    branch: master
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - sync: false
        key: DATABASE_URL
      - sync: false
        key: JWT_SECRET
      - sync: false
        key: SESSION_SECRET
      - sync: false
        key: REDIS_URL
    healthCheckPath: /
